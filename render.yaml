services:
  - type: web
    name: lush-makeovers-api
    runtime: python
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # Paste your MongoDB Atlas connection string here after creating the
      # cluster (see README > Going live).
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: lush_makeovers
      # Auto-generated by Render — do not reuse the local dev value.
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_ADMIN_EMAIL
        sync: false
      # Set a strong password here; this is the first admin login.
      - key: SEED_ADMIN_PASSWORD
        sync: false
      # Comma-separated list of allowed frontend origins, e.g.
      # https://lushmakeovers.vercel.app,https://lushmakeovers.in
      - key: CORS_ORIGINS
        sync: false
      # Your Vercel/custom-domain frontend URL — used to build the link
      # inside password-reset emails, e.g. https://lushmakeovers.in
      - key: FRONTEND_URL
        sync: false
      # From resend.com — without this, forgot-password has no way to email
      # the reset link.
      - key: RESEND_API_KEY
        sync: false
      # lushmakeovers.in is verified in Resend — sending from it directly.
      - key: RESEND_FROM_EMAIL
        value: Lush Makeovers <noreply@lushmakeovers.in>
      # From cloudinary.com's dashboard — required for photo uploads in the
      # admin Media Library (Render's own disk doesn't survive a redeploy).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
